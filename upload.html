<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload de Bordado — Citerol</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f8fa; color: #33475b; padding: 16px; }
    .card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 1px 6px rgba(0,0,0,0.1); max-width: 480px; margin: 0 auto; }
    h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .label { font-size: 11px; color: #7c98b6; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .4px; }
    .filename-box { background: #eef3fb; border: 1px solid #c4d3e8; border-radius: 5px; padding: 8px 12px; font-size: 13px; font-weight: 600; color: #0044cc; margin-bottom: 14px; word-break: break-all; }
    .drop-zone { border: 2px dashed #cbd6e2; border-radius: 7px; padding: 20px 12px; text-align: center; cursor: pointer; transition: all .2s; margin-bottom: 10px; position: relative; }
    .drop-zone:hover, .drop-zone.drag { border-color: #0070cd; background: #f0f7ff; }
    .drop-zone input { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .drop-zone .icon { font-size: 26px; margin-bottom: 5px; }
    .drop-zone p { font-size: 13px; color: #516f90; pointer-events: none; }
    .drop-zone small { font-size: 11px; color: #99acc2; pointer-events: none; }
    .file-info { display: none; align-items: center; gap: 7px; background: #e6f4ea; border: 1px solid #b2dfbc; border-radius: 5px; padding: 8px 12px; margin-bottom: 10px; font-size: 13px; color: #2e7d32; }
    .error-box { display: none; background: #fce8e8; border: 1px solid #f5c2c2; border-radius: 5px; padding: 8px 12px; margin-bottom: 10px; font-size: 12px; color: #c0392b; }
    .progress { display: none; margin-bottom: 10px; }
    .progress-bar { background: #e5eaf0; border-radius: 99px; height: 6px; overflow: hidden; }
    .progress-fill { background: #0070cd; height: 100%; width: 0%; transition: width .3s; border-radius: 99px; }
    .progress-text { font-size: 12px; color: #516f90; margin-top: 4px; }
    .btn { display: block; width: 100%; background: #ff7a59; color: white; border: none; border-radius: 6px; padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .2s; }
    .btn:hover:not(:disabled) { background: #e8674a; }
    .btn:disabled { background: #cbd6e2; cursor: not-allowed; }
    .success-card { display: none; text-align: center; padding: 28px 20px; background: white; border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.1); max-width: 480px; margin: 0 auto; }
    .success-card .big-icon { font-size: 44px; margin-bottom: 10px; }
    .success-card h2 { font-size: 16px; color: #2e7d32; margin-bottom: 6px; }
    .success-card p { font-size: 12px; color: #7c98b6; }
  </style>
</head>
<body>
  <div class="card" id="upload-card">
    <h2>📎 Upload de arquivo de bordado</h2>
    <p class="label">Nome que será salvo</p>
    <div class="filename-box" id="filename-display">—</div>

    <label class="drop-zone" id="drop-zone" for="fileInput">
      <input type="file" id="fileInput" accept=".pdf,.ai,.eps,.png,.jpg,.jpeg,.svg,.cdr,.zip,.psd,.tiff,.tif">
      <div class="icon">📂</div>
      <p>Clique para selecionar o arquivo</p>
      <small>PDF, AI, EPS, PNG, JPG, SVG, CDR — máx. 4 MB</small>
    </label>

    <div class="file-info" id="file-info"><span>✅</span><span id="file-info-name"></span></div>
    <div class="error-box" id="error-box"></div>
    <div class="progress" id="progress">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <p class="progress-text" id="progress-text">Enviando...</p>
    </div>

    <button class="btn" id="sendBtn" disabled onclick="sendFile()">Confirmar e salvar bordado</button>
  </div>

  <div class="success-card" id="success-card">
    <div class="big-icon">✅</div>
    <h2>Bordado salvo com sucesso!</h2>
    <p>Feche esta janela e clique em "↺ Atualizar" no card para ver.</p>
  </div>

  <script>
    const MAX_MB = 4;
    const p             = new URLSearchParams(window.location.search);
    const token         = p.get('token')         || '';
    const dealId        = p.get('dealId')         || '';
    const productId     = p.get('productId')      || '';
    const productName   = p.get('productName')    || '';
    const sku           = p.get('sku')            || '';
    const position      = p.get('position')       || '';
    const positionLabel = p.get('positionLabel')  || '';
    const companyName   = p.get('companyName')    || '';
    const generatedName = p.get('name')           || `${sku}-${positionLabel}-${companyName}`;
    const bordadoId     = p.get('bordadoId')      || '';

    document.getElementById('filename-display').textContent = generatedName || '—';

    if (!token || !dealId) {
      document.getElementById('error-box').textContent = 'Parâmetros inválidos. Feche e tente novamente pelo card.';
      document.getElementById('error-box').style.display = 'block';
    }

    let fileBlob = null, fileName = null, fileType = null;

    document.getElementById('fileInput').addEventListener('change', function(e) {
      handleFile(e.target.files[0]);
    });

    function handleFile(file) {
      const errorEl = document.getElementById('error-box');
      const infoEl  = document.getElementById('file-info');
      const btn     = document.getElementById('sendBtn');
      errorEl.style.display = 'none';
      infoEl.style.display  = 'none';
      btn.disabled = true;
      fileBlob = null;
      if (!file) return;
      if (file.size > MAX_MB * 1024 * 1024) {
        errorEl.textContent = `Arquivo muito grande (${(file.size/1024/1024).toFixed(1)} MB). Máx: ${MAX_MB} MB.`;
        errorEl.style.display = 'block';
        return;
      }
      fileBlob = file;
      fileName = file.name;
      fileType = file.type || 'application/octet-stream';
      document.getElementById('file-info-name').textContent = `${file.name} (${(file.size/1024).toFixed(0)} KB)`;
      infoEl.style.display = 'flex';
      btn.disabled = false;
    }

    function setProgress(pct, text) {
      document.getElementById('progress').style.display = 'block';
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-text').textContent = text;
    }

    function showError(msg) {
      document.getElementById('error-box').textContent = msg;
      document.getElementById('error-box').style.display = 'block';
      document.getElementById('progress').style.display = 'none';
      document.getElementById('sendBtn').disabled = false;
    }

    async function sendFile() {
      if (!fileBlob) return;
      if (!token || !dealId) { showError('Token ou dealId ausente.'); return; }

      document.getElementById('sendBtn').disabled = true;
      document.getElementById('error-box').style.display = 'none';

      try {
        // 1. Upload para HubSpot Files API
        setProgress(20, 'Enviando arquivo...');
        const ext = fileName.includes('.') ? fileName.split('.').pop() : 'bin';
        const cleanName = generatedName.replace(/[/\\:*?"<>|]/g, '-').replace(/\s+/g, '_');
        const finalFileName = `${cleanName}.${ext}`;

        const form = new FormData();
        form.append('file', fileBlob, finalFileName);
        form.append('options', JSON.stringify({ access: 'PUBLIC_INDEXABLE', overwriteExisting: false }));
        form.append('folderPath', '/bordados-citerol');
        form.append('fileName', finalFileName);

        let uploadRes;
        try {
          uploadRes = await fetch('https://api.hubapi.com/files/v3/files', {
            method: 'POST',
            headers: { Authorization: `Bearer ${token}` },
            body: form,
          });
        } catch(corsErr) {
          throw new Error('Erro de CORS ao enviar arquivo. Verifique as configurações do app.');
        }

        if (!uploadRes.ok) {
          const txt = await uploadRes.text();
          throw new Error(`Upload falhou (${uploadRes.status}): ${txt.substring(0, 200)}`);
        }

        const uploaded = await uploadRes.json();
        const fileUrl  = uploaded.url;
        const fileId   = String(uploaded.id); // HubSpot file properties usam ID
        setProgress(55, 'Buscando negócio...');

        // 2. Busca bordados existentes
        const dealRes = await fetch(
          `https://api.hubapi.com/crm/v3/objects/deals/${dealId}?properties=bordados_json`,
          { headers: { Authorization: `Bearer ${token}` } }
        );
        if (!dealRes.ok) throw new Error(`Erro ao buscar negócio (${dealRes.status}).`);
        const deal = await dealRes.json();

        let bordados = [];
        try {
          const raw = deal.properties?.bordados_json;
          if (raw) { const parsed = JSON.parse(raw); if (Array.isArray(parsed)) bordados = parsed; }
        } catch(e) {}

        const now = new Date().toISOString();
        if (bordadoId) {
          const idx = bordados.findIndex(b => b.id === bordadoId);
          if (idx >= 0) {
            bordados[idx] = { ...bordados[idx], productId, productName, sku, position, positionLabel, fileName: finalFileName, fileUrl, fileId, updatedAt: now };
          }
        } else {
          bordados.push({
            id: `b_${Date.now()}_${Math.random().toString(36).substr(2,6)}`,
            productId, productName, sku, position, positionLabel,
            fileName: finalFileName, fileUrl, fileId, createdAt: now,
          });
        }

        // 3. Salva no deal
        setProgress(80, 'Salvando bordado...');
        const patchRes = await fetch(`https://api.hubapi.com/crm/v3/objects/deals/${dealId}`, {
          method: 'PATCH',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            properties: {
              bordados_json: JSON.stringify(bordados),
              arquivo_do_negocio: fileId,  // ID do arquivo, não URL
            }
          }),
        });

        if (!patchRes.ok) {
          const txt = await patchRes.text();
          throw new Error(`Erro ao salvar no negócio (${patchRes.status}): ${txt.substring(0, 200)}`);
        }

        setProgress(100, 'Concluído!');
        setTimeout(() => {
          document.getElementById('upload-card').style.display  = 'none';
          document.getElementById('success-card').style.display = 'block';
        }, 400);

      } catch(err) {
        console.error('Erro no upload:', err);
        showError(err.message || 'Erro inesperado. Verifique o console do navegador.');
      }
    }
  </script>
</body>
</html>
