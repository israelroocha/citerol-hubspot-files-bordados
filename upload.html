<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload de Bordado — Citerol</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f8fa;
      color: #33475b;
      padding: 20px;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 22px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.12);
      max-width: 480px;
      margin: 0 auto;
    }
    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .field-label {
      font-size: 11px;
      font-weight: 600;
      color: #7c98b6;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 5px;
    }
    .filename-box {
      background: #eef3fb;
      border: 1px solid #c4d3e8;
      border-radius: 6px;
      padding: 9px 13px;
      font-size: 13px;
      font-weight: 600;
      color: #0044cc;
      margin-bottom: 16px;
      word-break: break-all;
      min-height: 36px;
    }
    .drop-zone {
      border: 2px dashed #cbd6e2;
      border-radius: 8px;
      padding: 28px 16px 22px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      margin-bottom: 12px;
      position: relative;
      background: #fff;
    }
    .drop-zone:hover { border-color: #0070cd; background: #f0f7ff; }
    .drop-zone input {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0;
      cursor: pointer;
    }
    .drop-icon { font-size: 30px; margin-bottom: 8px; }
    .drop-text { font-size: 13px; color: #516f90; margin-bottom: 4px; pointer-events: none; }
    .drop-hint { font-size: 11px; color: #99acc2; pointer-events: none; }
    .file-info {
      display: none;
      align-items: center;
      gap: 8px;
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      border-radius: 6px;
      padding: 9px 13px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #2e7d32;
    }
    .error-box {
      display: none;
      background: #fce8e8;
      border: 1px solid #ef9a9a;
      border-radius: 6px;
      padding: 9px 13px;
      margin-bottom: 12px;
      font-size: 12px;
      color: #c62828;
      line-height: 1.5;
    }
    .progress {
      display: none;
      margin-bottom: 12px;
    }
    .progress-bar {
      background: #e0e7ef;
      border-radius: 99px;
      height: 7px;
      overflow: hidden;
    }
    .progress-fill {
      background: #1565c0;
      height: 100%;
      width: 0%;
      transition: width .3s ease;
      border-radius: 99px;
    }
    .progress-label {
      font-size: 12px;
      color: #516f90;
      margin-top: 5px;
      text-align: center;
    }
    .btn {
      display: block;
      width: 100%;
      background: #ff7a59;
      color: white;
      border: none;
      border-radius: 7px;
      padding: 13px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
      letter-spacing: .2px;
    }
    .btn:hover:not(:disabled) { background: #e8674a; }
    .btn:disabled { background: #b0bec5; cursor: not-allowed; }

    /* Tela de sucesso */
    .success-screen {
      display: none;
      text-align: center;
      padding: 32px 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.12);
      max-width: 480px;
      margin: 0 auto;
    }
    .success-icon { font-size: 52px; margin-bottom: 14px; }
    .success-title { font-size: 17px; font-weight: 700; color: #2e7d32; margin-bottom: 8px; }
    .success-hint { font-size: 13px; color: #7c98b6; line-height: 1.6; }
  </style>
</head>
<body>

  <div class="card" id="uploadCard">
    <div class="card-title">📎 Upload de arquivo de bordado</div>

    <div class="field-label">Nome que será salvo</div>
    <div class="filename-box" id="filenameDisplay">—</div>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput"
        accept=".pdf,.ai,.eps,.png,.jpg,.jpeg,.svg,.cdr,.zip,.psd,.tiff,.tif">
      <div class="drop-icon">📂</div>
      <div class="drop-text">Clique para selecionar o arquivo</div>
      <div class="drop-hint">PDF, AI, EPS, PNG, JPG, SVG, CDR, ZIP — máx. 4 MB</div>
    </div>

    <div class="file-info" id="fileInfo">
      <span>✅</span><span id="fileInfoName"></span>
    </div>
    <div class="error-box" id="errorBox"></div>

    <div class="progress" id="progressEl">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-label" id="progressLabel">Enviando...</div>
    </div>

    <button class="btn" id="sendBtn" disabled onclick="sendFile()">
      Confirmar e salvar bordado
    </button>
  </div>

  <div class="success-screen" id="successScreen">
    <div class="success-icon">✅</div>
    <div class="success-title">Bordado salvo com sucesso!</div>
    <div class="success-hint">
      Feche esta janela e clique em<br>
      <strong>"↺ Atualizar"</strong> no card do HubSpot para ver o bordado.
    </div>
  </div>

  <script>
    const WORKER_URL = 'https://citerol-bordados.israel-caetano-lima.workers.dev/';
    const MAX_MB = 4;

    const q             = new URLSearchParams(window.location.search);
    const dealId        = q.get('dealId')          || '';
    const productId     = q.get('productId')       || '';
    const productName   = q.get('productName')     || '';
    const sku           = q.get('sku')             || '';
    const position      = q.get('position')        || '';
    const positionLabel = q.get('positionLabel')   || '';
    const companyName   = q.get('companyName')     || '';
    const generatedName = q.get('name')            || [sku, positionLabel, companyName].filter(Boolean).join(' - ');
    const bordadoId     = q.get('bordadoId')       || '';
    const expectedCount = q.get('expectedCount')   || '0';
    const jsonProperty  = q.get('jsonProperty')    || 'bordados_json';
    const arquivoProperty = q.get('arquivoProperty') || 'arquivo_do_negocio';

    document.getElementById('filenameDisplay').textContent = generatedName || '—';

    let fileBlob = null;
    let fileName = null;

    document.getElementById('fileInput').addEventListener('change', function (e) {
      handleFile(e.target.files[0]);
    });

    function handleFile(file) {
      const errorBox = document.getElementById('errorBox');
      const fileInfo = document.getElementById('fileInfo');
      const sendBtn  = document.getElementById('sendBtn');

      errorBox.style.display = 'none';
      fileInfo.style.display = 'none';
      sendBtn.disabled = true;
      fileBlob = null;

      if (!file) return;

      if (file.size > MAX_MB * 1024 * 1024) {
        errorBox.textContent = `Arquivo muito grande: ${(file.size / 1024 / 1024).toFixed(1)} MB. Máximo permitido: ${MAX_MB} MB.`;
        errorBox.style.display = 'block';
        return;
      }

      fileBlob = file;
      fileName = file.name;
      document.getElementById('fileInfoName').textContent =
        `${file.name}  (${(file.size / 1024).toFixed(0)} KB)`;
      fileInfo.style.display = 'flex';
      sendBtn.disabled = false;
    }

    function setProgress(pct, label) {
      document.getElementById('progressEl').style.display = 'block';
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressLabel').textContent = label;
    }

    function showError(msg) {
      const el = document.getElementById('errorBox');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('progressEl').style.display = 'none';
      document.getElementById('sendBtn').disabled = false;
    }

    async function sendFile() {
      if (!fileBlob || !dealId) {
        showError('Dados incompletos. Feche esta janela e tente novamente pelo card.');
        return;
      }

      document.getElementById('sendBtn').disabled = true;
      document.getElementById('errorBox').style.display = 'none';

      try {
        setProgress(20, 'Preparando arquivo...');

        const ext = fileName.includes('.') ? fileName.split('.').pop() : 'bin';
        const cleanName = generatedName.replace(/[\/\\:*?"<>|]/g, '').trim();
        const finalFileName = `${cleanName}.${ext}`;

        const form = new FormData();
        form.append('file',            fileBlob, finalFileName);
        form.append('finalFileName',   finalFileName);
        form.append('dealId',          dealId);
        form.append('productId',       productId);
        form.append('productName',     productName);
        form.append('sku',             sku);
        form.append('position',        position);
        form.append('positionLabel',   positionLabel);
        form.append('companyName',     companyName);
        form.append('generatedName',   generatedName);
        form.append('expectedCount',   expectedCount);
        form.append('jsonProperty',    jsonProperty);
        form.append('arquivoProperty', arquivoProperty);
        if (bordadoId) form.append('bordadoId', bordadoId);

        setProgress(50, 'Enviando para o HubSpot...');

        const res  = await fetch(WORKER_URL, { method: 'POST', body: form });
        const data = await res.json();

        if (!res.ok || data.error) throw new Error(data.error || `Erro ${res.status}`);

        setProgress(100, 'Concluído!');

        setTimeout(() => {
          document.getElementById('uploadCard').style.display   = 'none';
          document.getElementById('successScreen').style.display = 'block';
        }, 500);

      } catch (err) {
        showError(err.message || 'Erro inesperado. Tente novamente.');
      }
    }
  </script>
</body>
</html>
